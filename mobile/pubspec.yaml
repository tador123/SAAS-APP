name: hotel_restaurant_app
description: HotelSaaS - Hotel & Restaurant Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  qr_flutter: ^4.1.0
  printing: ^5.12.0
  connectivity_plus: ^6.0.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
