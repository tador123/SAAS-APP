name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hotelrestaurant_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: hotelrestaurant_test
      DB_USER: postgres
      DB_PASSWORD: postgres123
      TEST_DB_PASSWORD: postgres123
      JWT_SECRET: ci-test-secret-key-not-for-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm test

  # ──────────────────────────────────────
  # Web Admin Tests + Build
  # ──────────────────────────────────────
  web-admin-test:
    name: Web Admin Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web-admin/package-lock.json
      - run: cd web-admin && npm ci
      - run: cd web-admin && npx vitest run
      - run: cd web-admin && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-admin-dist
          path: web-admin/dist
          retention-days: 7

  # ──────────────────────────────────────
  # Docker Build Test
  # ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, web-admin-test]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache

  # ──────────────────────────────────────
  # Deploy (only on main branch push)
  # ──────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      # Add your deployment steps here. Examples:
      #
      # Option A: SSH deploy
      # - uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       cd /opt/hotelrestaurant
      #       git pull origin main
      #       docker compose down
      #       docker compose up -d --build
      #
      # Option B: Push to container registry
      # - uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - run: |
      #     docker compose build
      #     docker compose push
      - run: echo "✅ Ready to deploy — uncomment steps above for your hosting provider"
