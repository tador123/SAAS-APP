name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms android .

      - name: Patch Android minSdkVersion
        run: sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts || sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle

      - name: Create placeholder google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.example.hotel_restaurant_app"
                  }
                },
                "api_key": [
                  {
                    "current_key": "placeholder-key"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Ensure asset directories have content
        run: |
          touch assets/images/.gitkeep
          touch assets/icons/.gitkeep

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://app.hotelware.in/api

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotel-restaurant-app
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  deploy-apk:
    name: Deploy APK to Server
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: hotel-restaurant-app
          path: ./

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get runner IP and open SSH
        id: ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0e87e2be37ed02b40 \
            --protocol tcp --port 22 \
            --cidr "$RUNNER_IP/32" \
            --tag-specifications 'ResourceType=security-group-rule,Tags=[{Key=Name,Value=github-actions-temp}]' || true

      - name: Upload APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: app-release.apk
          target: /opt/hotelsaas/downloads/
          overwrite: true

      - name: Rename APK on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv /opt/hotelsaas/downloads/app-release.apk /opt/hotelsaas/downloads/HotelSaaS.apk
            echo "APK deployed to /downloads/HotelSaaS.apk"

      - name: Revoke runner SSH access
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0e87e2be37ed02b40 \
            --protocol tcp --port 22 \
            --cidr "${{ steps.ip.outputs.runner_ip }}/32" || true
