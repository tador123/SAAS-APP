name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms android .

      - name: Create placeholder google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.example.hotel_restaurant_app"
                  }
                },
                "api_key": [
                  {
                    "current_key": "placeholder-key"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Ensure asset directories have content
        run: |
          touch assets/images/.gitkeep
          touch assets/icons/.gitkeep

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://app.hotelware.in/api

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotel-restaurant-app
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
