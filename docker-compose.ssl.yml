# Overlay for HTTPS/SSL — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.ssl.yml up -d
#
# Before starting:
#   1. Place SSL certs in ./ssl/fullchain.pem and ./ssl/privkey.pem
#   2. Update CORS_ORIGINS in .env to use https://YOUR_DOMAIN.com
#   3. Update FRONTEND_URL in .env to https://YOUR_DOMAIN.com

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        NGINX_CONF: nginx/nginx-ssl.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
